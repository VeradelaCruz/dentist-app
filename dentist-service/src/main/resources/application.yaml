spring:
  application:
    name: dentist-service

  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

  mongodb:
    # En contenedor: SPRING_MONGODB_URI=mongodb://mongodb:27017/doctor_db
    uri: ${SPRING_MONGODB_URI:mongodb://localhost:27017/doctor_db}

  kafka:
    # En contenedor: SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: 8086

